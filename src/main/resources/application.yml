server:
  port: ${PORT:8080}
  servlet:
    session:
      timeout: 2h

spring:
  application:
    name: campus-market
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:campus_market;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true

campus:
  upload-dir: ${CAMPUS_UPLOAD_DIR:uploads}
  rate-limit:
    ai-per-minute: 40
  ai:
    customer:
      api-url: ${AI_CUSTOMER_API_URL:}
      api-key: ${AI_CUSTOMER_API_KEY:}
      model: ${AI_CUSTOMER_MODEL:deepseek-v4-flash}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    com.qihang.campusmarket.mapper: debug
