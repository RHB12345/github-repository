<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<article th:fragment="productCard(item)" class="product-card">
    <a class="product-cover skeleton-media" th:href="@{/products/{id}(id=${item.id})}">
        <img class="lazy-img" th:src="${item.coverUrl}" th:alt="${item.title}" loading="lazy" decoding="async">
        <span class="status-badge" th:classappend="' status-' + ${item.status}" th:text="${productStatusLabels[item.status]}">在售</span>
    </a>
    <div class="product-body">
        <div class="d-flex align-items-start justify-content-between gap-2">
            <a class="product-title" th:href="@{/products/{id}(id=${item.id})}" th:text="${item.title}">商品标题</a>
            <span class="price" th:text="'￥' + ${#numbers.formatDecimal(item.price, 1, 2)}">￥0.00</span>
        </div>
        <p class="product-desc" th:text="${item.description}">描述</p>
        <div class="product-meta">
            <span><i class="bi bi-tags"></i> <span th:text="${item.category}">分类</span></span>
            <span><i class="bi bi-award"></i> <span th:text="${item.conditionLabel}">成色</span></span>
        </div>
        <div class="seller-row">
            <span><i class="bi bi-person-check"></i> <span th:text="${item.sellerNickname}">卖家</span></span>
            <span><i class="bi bi-heart"></i> <span th:text="${item.favoriteCount}">0</span></span>
        </div>
    </div>
</article>
</body>
</html>
