<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | 码上启航'">码上启航</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg sticky-top glass-nav">
    <div class="container">
        <a class="navbar-brand brand-mark" th:href="@{/}">
            <span class="brand-icon"><i class="bi bi-compass"></i></span>
            <span>码上启航</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="切换导航">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-house"></i> 首页</a></li>
                <li class="nav-item"><a class="nav-link" href="/#process"><i class="bi bi-diagram-3"></i> 流程</a></li>
                <li class="nav-item"><a class="nav-link" href="/#services"><i class="bi bi-stars"></i> 能力</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}"><i class="bi bi-grid"></i> 商品</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products/new}"><i class="bi bi-plus-square"></i> 发布</a></li>
                <li class="nav-item" th:if="${loginUser != null}"><a class="nav-link" th:href="@{/orders}"><i class="bi bi-receipt"></i> 订单</a></li>
                <li class="nav-item" th:if="${loginUser != null}"><a class="nav-link" th:href="@{/messages}"><i class="bi bi-chat-dots"></i> 消息</a></li>
                <li class="nav-item" th:if="${loginUser != null and loginUser.role == 'ADMIN'}"><a class="nav-link" th:href="@{/admin}"><i class="bi bi-speedometer2"></i> 后台</a></li>
                <li class="nav-item dropdown" th:if="${loginUser != null}">
                    <a class="nav-link dropdown-toggle user-pill" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <img th:src="${loginUser.avatarUrl}" alt="头像">
                        <span th:text="${loginUser.nickname}">用户</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/user/profile}"><i class="bi bi-person"></i> 个人中心</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button class="dropdown-item" type="submit"><i class="bi bi-box-arrow-right"></i> 退出登录</button>
                            </form>
                        </li>
                    </ul>
                </li>
                <li class="nav-item" th:if="${loginUser == null}"><a class="btn btn-outline-dark btn-sm" th:href="@{/login}">登录</a></li>
                <li class="nav-item" th:if="${loginUser == null}"><a class="btn btn-accent btn-sm" th:href="@{/register}">实名认证</a></li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="flash" class="toast-layer">
    <div class="toast align-items-center toast-success" th:if="${success}" role="status" aria-live="polite" aria-atomic="true" data-bs-delay="3200">
        <div class="d-flex">
            <div class="toast-body">
                <i class="bi bi-check-circle"></i>
                <span th:text="${success}">成功</span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="关闭"></button>
        </div>
    </div>
    <div class="toast align-items-center toast-error" th:if="${error}" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4200">
        <div class="d-flex">
            <div class="toast-body">
                <i class="bi bi-exclamation-triangle"></i>
                <span th:text="${error}">错误</span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="关闭"></button>
        </div>
    </div>
</div>

<footer th:fragment="footer" class="site-footer">
    <div class="container d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
        <div>
            <strong>码上启航</strong>
            <span class="text-muted ms-2">安徽信息工程学院校园二手交易平台</span>
        </div>
        <div class="footer-links">
            <span><i class="bi bi-shield-check"></i> 学号认证</span>
            <span><i class="bi bi-geo-alt"></i> 同校面交</span>
            <span><i class="bi bi-recycle"></i> 闲置循环</span>
        </div>
    </div>
</footer>

<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</th:block>
</body>
</html>
