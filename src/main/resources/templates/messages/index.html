<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('站内消息')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div th:replace="~{fragments/layout :: flash}"></div>

<main class="container page-shell">
    <div class="section-heading">
        <div>
            <span class="eyebrow">MESSAGES</span>
            <h1>站内消息</h1>
        </div>
    </div>
    <div class="message-list" th:if="${!messages.isEmpty()}">
        <a class="message-item" th:each="message : ${messages}"
           th:href="@{/messages/dialog(peerId=${message.senderId == loginUser.id ? message.receiverId : message.senderId}, productId=${message.productId})}">
            <div class="message-icon"><i class="bi bi-chat-dots"></i></div>
            <div>
                <div class="message-head">
                    <strong th:text="${message.senderId == loginUser.id ? message.receiverName : message.senderName}">对方</strong>
                    <span th:text="${#temporals.format(message.createdAt, 'MM-dd HH:mm')}">时间</span>
                </div>
                <p th:text="${message.content}">内容</p>
                <small th:text="${message.productTitle}">商品</small>
            </div>
        </a>
    </div>
    <div class="empty-state" th:if="${messages.isEmpty()}">
        <i class="bi bi-chat-square-text"></i>
        <h3>暂无站内消息</h3>
        <p>在商品详情页联系卖家后，对话会出现在这里。</p>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
